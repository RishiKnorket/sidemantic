version: 2

semantic_models:
  - name: orders
    defaults:
      agg_time_dimension: order_date
    model: ref('orders')
    entities:
      - name: order_id
        type: primary
      - name: customer_id
        type: foreign
    dimensions:
      - name: status
        type: categorical
      - name: order_date
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: total_revenue
        agg: sum
        expr: amount
      - name: order_count
        agg: count
        expr: order_id

metrics:
  - name: total_revenue
    description: Total revenue from orders
    type: simple
    label: Total Revenue
    type_params:
      measure: total_revenue
    filter: |
      {{ Dimension('order_status') }} = 'completed'
