models:
  - name: customers
    table: customers
    primary_key: customer_id
    dimensions:
      - name: customer_id
        type: numeric
        sql: customer_id
      - name: name
        type: categorical
        sql: name
      - name: email
        type: categorical
        sql: email
    metrics:
      - name: customer_count
        agg: count
        sql: customer_id
