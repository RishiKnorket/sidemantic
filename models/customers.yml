models:
  - name: customers
    table: customers_table
    primary_key: customer_id
    description: "Customer information"
    
    dimensions:
      - name: customer_id
        type: categorical
        sql: customer_id
        description: "Unique customer identifier"
      
      - name: country
        type: categorical
        sql: country
        description: "Customer country"
      
      - name: city
        type: categorical
        sql: city
        description: "Customer city"
      
      - name: customer_tier
        type: categorical
        sql: tier
        description: "Customer segment"
      
      - name: registration_date
        type: time
        sql: signup_date
        granularity: day
        description: "Date when customer registered"
    
    metrics:
      - name: customer_count
        type: number
        agg: count_distinct
        sql: customer_id
        description: "Number of unique customers"
      
      - name: lifetime_value
        type: number
        agg: sum
        sql: total_spent
        description: "Customer lifetime value"
    
    relationships:
      - to: orders
        from_field: customer_id
        to_field: customer_id
