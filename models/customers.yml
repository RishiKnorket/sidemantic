models:
  - name: customers
    table: customers
    primary_key: customer_id
    dimensions:
      - name: customer_id
        type: number
      - name: name
        type: string
      - name: email
        type: string
      - name: country
        type: string
    metrics:
      - name: customer_count
        agg: count_distinct
        sql: customer_id
