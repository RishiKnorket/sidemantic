cubes:
  - name: orders
    sql_table: demo.orders
    description: Order transactions
    
    dimensions:
      - name: order_id
        sql: order_id
        type: number
        primary_key: true
      
      - name: status
        sql: status
        type: string
      
      - name: customer_id
        sql: customer_id
        type: number
      
      - name: order_date
        sql: order_date
        type: time
        granularities:
          - day
          - week
          - month
          - quarter
          - year
    
    measures:
      - name: total_revenue
        type: sum
        sql: amount
        description: Total revenue from orders
      
      - name: order_count
        type: count
        sql: order_id
        description: Number of orders
      
      - name: avg_order_value
        type: avg
        sql: amount
        description: Average order value
    
    joins:
      - name: customers
        sql: "{CUBE}.customer_id = {customers}.customer_id"
        relationship: many_to_one
