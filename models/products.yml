name: products
table: products_table
description: "Product catalog"

dimensions:
  - name: id
    type: string
    sql: product_id
    description: "Unique product identifier"
  
  - name: category
    type: string
    sql: category
    description: "Product category"
  
  - name: brand
    type: string
    sql: brand
    description: "Product brand"

metrics:
  - name: total_sold
    type: number
    sql: SUM(quantity_sold)
    description: "Total units sold"
  
  - name: revenue
    type: number
    sql: SUM(quantity_sold * price)
    description: "Total revenue from products"
