name: products
table: products_table
description: "Product catalog and inventory"

dimensions:
  - name: id
    type: string
    sql: product_id
    description: "Unique product identifier"
    primary_key: true

  - name: name
    type: string
    sql: product_name
    description: "Product name"

  - name: category
    type: string
    sql: product_category
    description: "Product category"
    allowed_values: ["electronics", "clothing", "books", "home", "sports"]

  - name: subcategory
    type: string
    sql: product_subcategory
    description: "Product subcategory"

  - name: brand
    type: string
    sql: brand_name
    description: "Product brand"

  - name: price
    type: number
    sql: unit_price
    description: "Current selling price"
    format: currency

  - name: cost
    type: number
    sql: unit_cost
    description: "Product cost"
    format: currency

  - name: created_at
    type: time
    sql: product_added_date
    description: "Date product was added to catalog"
    granularities: [day, week, month, quarter, year]

  - name: inventory_status
    type: string
    sql: |
      CASE 
        WHEN stock_quantity > 100 THEN 'In Stock'
        WHEN stock_quantity > 0 THEN 'Low Stock'
        ELSE 'Out of Stock'
      END
    description: "Current inventory status"

  - name: stock_quantity
    type: number
    sql: stock_quantity
    description: "Units available in inventory"

  - name: is_active
    type: boolean
    sql: is_active
    description: "Whether product is active for sale"

metrics:
  - name: total_sold
    type: number
    sql: "SUM(units_sold)"
    description: "Total units sold"

  - name: product_revenue
    type: number
    sql: "SUM(units_sold * unit_price)"
    description: "Revenue generated by product"
    format: currency

  - name: profit
    type: number
    sql: "SUM(units_sold * (unit_price - unit_cost))"
    description: "Gross profit"
    format: currency

  - name: profit_margin
    type: number
    sql: |
      SUM(units_sold * (unit_price - unit_cost)) * 1.0 / 
      NULLIF(SUM(units_sold * unit_price), 0)
    description: "Profit margin percentage"

  - name: inventory_turnover
    type: number
    sql: "SUM(units_sold) * 1.0 / NULLIF(AVG(stock_quantity), 0)"
    description: "Inventory turnover ratio"

  - name: distinct_products
    type: number
    sql: "COUNT(DISTINCT product_id)"
    description: "Number of unique products"

segments:
  - name: active_products
    sql: "is_active = true"
    description: "Products currently for sale"

  - name: low_stock_products
    sql: "stock_quantity > 0 AND stock_quantity < 50"
    description: "Products running low on inventory"

  - name: high_margin_products
    sql: "(unit_price - unit_cost) / unit_price > 0.4"
    description: "Products with >40% profit margin"

  - name: top_selling
    sql: "units_sold > 1000"
    description: "Products with >1000 units sold"

relationships:
  - name: appears_in_orders
    type: has_many
    foreign_key: product_id
    model: orders
    description: "Orders containing this product"
