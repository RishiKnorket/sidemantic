models:
  - name: products
    table: products_table
    primary_key: product_id
    description: "Product catalog"
    
    dimensions:
      - name: product_id
        type: categorical
        sql: product_id
        description: "Unique product identifier"
      
      - name: category
        type: categorical
        sql: category
        description: "Product category"
      
      - name: brand
        type: categorical
        sql: brand
        description: "Product brand"
    
    metrics:
      - name: total_sold
        type: number
        agg: sum
        sql: quantity_sold
        description: "Total units sold"
      
      - name: revenue
        type: number
        agg: sum
        sql: quantity_sold * price
        description: "Product revenue"
