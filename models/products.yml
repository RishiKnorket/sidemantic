models:
  - name: products
    table: products_table
    primary_key: product_id
    description: "Product catalog"
    
    dimensions:
      - name: id
        type: categorical
        sql: product_id
        description: "Product identifier"
      
      - name: category
        type: categorical
        sql: category
        description: "Product category"
      
      - name: brand
        type: categorical
        sql: brand
        description: "Product brand"
      
      - name: price
        type: number
        sql: price
        description: "Product price"
    
    metrics:
      - name: total_sold
        type: number
        agg: sum
        sql: quantity_sold
        description: "Total units sold"
      
      - name: revenue
        type: number
        agg: sum
        sql: quantity_sold * price
        description: "Product revenue"
      
      - name: profit
        type: number
        agg: sum
        sql: quantity_sold * (price - cost)
        description: "Product profit"
