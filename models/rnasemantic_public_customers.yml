---
cubes:
- name: rnasemantic_public_customers
  sql_table: customers
  dimensions:
  - name: city
    sql: city
    type: string
  - name: state
    sql: state
    type: string
  - name: signup_date
    sql: signup_date
    type: time
  - name: customer_id
    sql: customer_id
    type: string
  - name: customer_name
    sql: customer_name
    type: string
  - name: segment
    sql: segment
    type: string
  measures:
  - name: customer_count
    sql: customer_id
    type: count
