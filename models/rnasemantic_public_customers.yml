cubes:
  - name: rnasemantic_public_customers
    sql_table: customers
    description: "Customer information"
    
    dimensions:
      - name: customer_id
        sql: customer_id
        type: number
        primary_key: true
      
      - name: customer_name
        sql: customer_name
        type: string
      
      - name: city
        sql: city
        type: string
      
      - name: state
        sql: state
        type: string
      
      - name: signup_date
        sql: signup_date
        type: time
      
      - name: segment
        sql: segment
        type: string
    
    measures:
      - name: total_customers
        sql: customer_id
        type: count
      
      - name: distinct_customers
        sql: customer_id
        type: count_distinct
