---
cubes:
- name: rnasemantic_public_customers
  sql_table: customers
  dimensions:
  - name: city
    sql: city
    type: string
  - name: state
    sql: state
    type: string
  - name: signup_date
    sql: signup_date
    type: time  # ← CHANGED from "string" to "time" for better handling
  - name: customer_id
    sql: customer_id
    type: string
  - name: customer_name
    sql: customer_name
    type: string
  - name: segment
    sql: segment
    type: string
  measures:
  - name: total_customers
    sql: customer_id
    type: count  # ← ADDED a measure so it's not empty
  - name: distinct_customers
    sql: customer_id
    type: count_distinct  # ← ADDED another measure
