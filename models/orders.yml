models:
  - name: orders
    table: orders_table
    primary_key: order_id
    description: "Order transactions with revenue and status"
    
    dimensions:
      - name: order_id
        type: categorical
        sql: order_id
        description: "Unique order identifier"
      
      - name: status
        type: categorical
        sql: status
        description: "Order status - completed, pending, cancelled"
      
      - name: order_date
        type: time
        sql: order_date
        granularity: day
        description: "Date when order was placed - use for daily, weekly, monthly analysis"
      
      - name: customer_name
        type: categorical
        sql: customer_name
        description: "Name of customer who placed the order"
      
      - name: customer_id
        type: categorical
        sql: customer_id
        description: "Reference to customer"
    
    metrics:
      - name: revenue
        type: number
        agg: sum
        sql: amount
        description: "Total revenue from orders"
      
      - name: order_count
        type: number
        agg: count
        sql: order_id
        description: "Number of orders"
      
      - name: average_order_value
        type: number
        agg: avg
        sql: amount
        description: "Average value per order"
    
    relationships:
      - to: customers
        from_field: customer_id
        to_field: customer_id
