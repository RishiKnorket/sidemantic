models:
  - name: orders
    table: orders_table
    primary_key: order_id
    description: "Order transactions"
    
    dimensions:
      - name: order_id
        type: categorical
        sql: order_id
        description: "Unique order identifier"
      
      - name: status
        type: categorical
        sql: status
        description: "Order status"
      
      - name: order_date
        type: time
        sql: order_date
        granularity: day
        description: "Date when order was placed"
      
      - name: customer_id
        type: categorical
        sql: customer_id
        description: "Reference to customer"
    
    metrics:
      - name: revenue
        type: number
        agg: sum
        sql: amount
        description: "Total revenue from orders"
      
      - name: order_count
        type: number
        agg: count
        sql: order_id
        description: "Number of orders"
    
    relationships:
      - to: customers
        from_field: customer_id
        to_field: customer_id
