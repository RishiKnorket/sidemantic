models:
  - name: orders
    table: orders_table
    primary_key: order_id
    dimensions:
      - name: order_id
        type: number
      - name: order_date
        type: time
        granularity: day
      - name: status
        type: categorical
      - name: customer_id
        type: number
    metrics:
      - name: total_revenue
        agg: sum
        sql: quantity * price
      - name: order_count
        agg: count
        sql: order_id
    relationships:
      - name: customers
        type: many_to_one
        foreign_key: customer_id
