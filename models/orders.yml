name: orders
table: orders_table
description: "Order transactions"

dimensions:
  - name: status
    type: string
    sql: status
    description: "Order status"
  
  - name: created_at
    type: time
    sql: created_at
    description: "Order date"

metrics:
  - name: total_revenue
    type: number
    sql: SUM(amount)
    description: "Total revenue from orders"
  
  - name: order_count
    type: number
    sql: COUNT(*)
    description: "Number of orders"
