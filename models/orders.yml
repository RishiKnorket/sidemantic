models:
  - name: orders
    table: orders_table
    primary_key: order_id
    description: "Orders table"
    dimensions:
      - name: order_id
        type: numeric
        sql: order_id
      - name: order_date
        type: time
        sql: order_date
        granularity: day
      - name: status
        type: categorical
        sql: status
      - name: customer_id
        type: numeric
        sql: customer_id
    metrics:
      - name: total_revenue
        agg: sum
        sql: quantity * price
      - name: order_count
        agg: count
        sql: order_id
    relationships:
      - name: customers
        type: many_to_one
        foreign_key: customer_id
