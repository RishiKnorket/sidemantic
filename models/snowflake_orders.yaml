name: orders
description: Order transactions

tables:
  - name: orders
    base_table:
      database: demo
      schema: public
      table: orders

dimensions:
  - name: order_id
    data_type: NUMBER
    is_primary_key: true
    
  - name: status
    data_type: TEXT
    
  - name: customer_id
    data_type: NUMBER

time_dimensions:
  - name: order_date
    data_type: DATE
    granularities:
      - day
      - week
      - month
      - quarter
      - year

facts:
  - name: amount
    data_type: NUMBER
    default_aggregation: sum

metrics:
  - name: total_revenue
    description: Total revenue from orders
    expression: SUM(amount)
    return_type: NUMBER
    
  - name: order_count
    description: Number of orders
    expression: COUNT(order_id)
    return_type: NUMBER

relationships:
  - name: orders_to_customers
    from_table: orders
    from_column: customer_id
    to_table: customers
    to_column: customer_id
    cardinality: many_to_one
