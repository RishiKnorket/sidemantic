# yaml-language-server: $schema=https://sidemantic.com/schema.json

models:
  # ============================================
  # ORDERS MODEL
  # ============================================
  - name: orders
    table: orders
    primary_key: order_id
    description: "Customer orders"
    
    dimensions:
      - name: status
        type: categorical
        sql: status
      
      - name: order_date
        type: time
        sql: created_at
        granularity: day
    
    metrics:
      - name: revenue
        agg: sum
        sql: amount
      
      - name: order_count
        agg: count
      
      - name: avg_order_value
        agg: avg
        sql: amount
      
      - name: completed_revenue
        agg: sum
        sql: amount
        filters: ["status = 'completed'"]

  # ============================================
  # CUSTOMERS MODEL
  # ============================================
  - name: customers
    table: customers
    primary_key: customer_id
    description: "Customer master data"
    
    relationships:
      - name: orders
        type: one_to_many
        foreign_key: customer_id
    
    dimensions:
      - name: region
        type: categorical
        sql: region
      
      - name: signup_date
        type: time
        sql: signup_date
        granularity: day

# ============================================
# GLOBAL METRICS
# ============================================
metrics:
  - name: avg_order_value
    type: ratio
    numerator: orders.revenue
    denominator: orders.order_count
