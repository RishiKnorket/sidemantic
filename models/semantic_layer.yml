# yaml-language-server: $schema=https://sidemantic.com/schema.json

models:
  # ============================================
  # CUSTOMERS MODEL
  # ============================================
  - name: customers
    table: customers
    primary_key: customer_id
    description: "Customer master data"
    
    dimensions:
      - name: customer_id
        type: numeric
        sql: customer_id
      
      - name: customer_name
        type: categorical
        sql: customer_name
      
      - name: region
        type: categorical
        sql: region
      
      - name: signup_date
        type: time
        sql: signup_date
        granularity: day

  # ============================================
  # ORDERS MODEL
  # ============================================
  - name: orders
    table: orders
    primary_key: order_id
    description: "Customer orders"
    
    relationships:
      - name: customer
        type: many_to_one
        foreign_key: customer_id
    
    dimensions:
      - name: order_id
        type: numeric
        sql: order_id
      
      - name: status
        type: categorical
        sql: status
      
      - name: order_date
        type: time
        sql: created_at
        granularity: day
      
      - name: customer_tier
        type: categorical
        sql: |
          CASE
            WHEN total_amount > 1000 THEN 'premium'
            WHEN total_amount > 100 THEN 'standard'
            ELSE 'basic'
          END
    
    metrics:
      - name: revenue
        agg: sum
        sql: amount
        description: "Total order revenue"
      
      - name: order_count
        agg: count
        description: "Number of orders"
      
      - name: avg_order_value
        agg: avg
        sql: amount
      
      - name: completed_revenue
        agg: sum
        sql: amount
        filters: ["status = 'completed'"]
      
      - name: large_orders
        agg: count
        filters: ["amount > 1000"]

  # ============================================
  # ORDER ITEMS MODEL
  # ============================================
  - name: order_items
    table: order_items
    primary_key: id
    description: "Order line items"
    
    relationships:
      - name: order
        type: many_to_one
        foreign_key: order_id
    
    dimensions:
      - name: id
        type: numeric
        sql: id
      
      - name: order_id
        type: numeric
        sql: order_id
      
      - name: sku
        type: categorical
        sql: sku
      
      - name: quantity
        type: numeric
        sql: quantity
      
      - name: unit_price
        type: numeric
        sql: unit_price
    
    metrics:
      - name: total_quantity
        agg: sum
        sql: quantity
      
      - name: line_items_count
        agg: count

  # ============================================
  # PRODUCTS MODEL
  # ============================================
  - name: products
    table: products
    primary_key: product_id
    description: "Product master data"
    
    relationships:
      - name: order_items
        type: one_to_many
        foreign_key: product_id
    
    dimensions:
      - name: product_id
        type: numeric
        sql: product_id
      
      - name: product_name
        type: categorical
        sql: product_name
      
      - name: category
        type: categorical
        sql: category
      
      - name: price
        type: numeric
        sql: price

# ============================================
# GLOBAL METRICS
# ============================================
metrics:
  - name: avg_order_value
    type: ratio
    numerator: orders.revenue
    denominator: orders.order_count
    description: "Average value per order"
  
  - name: revenue_per_customer
    type: ratio
    numerator: orders.revenue
    denominator: customers.count
    description: "Revenue per customer"
