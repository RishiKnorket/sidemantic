models:
  - name: orders
    table: orders
    primary_key: order_id
    
    dimensions:
      - name: status
        type: categorical
        sql: status
      - name: order_date
        type: time
        sql: created_at
        granularity: day
    
    metrics:
      - name: revenue
        agg: sum
        sql: amount
      - name: order_count
        agg: count
      - name: avg_order_value
        agg: avg
        sql: amount
      - name: completed_revenue
        agg: sum
        sql: amount
        filters: ["status = 'completed'"]
